<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestion - DestinX</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="w3-light-grey">
    <header class="w3-container w3-black w3-padding-16">
        <div class="w3-bar">
            <div class="w3-bar-item w3-large">DestinX</div>
            <div class="w3-bar-item w3-right">
                <a href="home.html" class="w3-button w3-black">Home</a>
                <a href="my-reservations.html" class="w3-button w3-black">Réservations</a>
                <a href="admin.html" class="w3-button w3-black">Admin</a>
                <a href="index.html" class="w3-button w3-black">Logout</a>
            </div>
        </div>
    </header>
    <div class="w3-content w3-padding-64">
        <h2 class="w3-text-black">Envoyer une suggestion</h2>
        <form id="suggestion-form" class="w3-card w3-white w3-padding-24">
            <p><textarea id="suggestion-text" class="w3-input w3-border" rows="6" placeholder="Votre suggestion"></textarea></p>
            <p><button type="submit" class="w3-button w3-black">Envoyer</button></p>
        </form>
        <div id="suggestion-success" class="w3-panel w3-green w3-text-white" style="display:none;">
            Suggestion envoyée ! Merci pour votre retour.
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
