<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - DestinX</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">DestinX</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="index.html">Logout</a>
        </nav>
    </header>
    <div class="container">
        <div class="form-page">
            <h2>Payment</h2>
            <div id="payment-summary">
                <!-- Summary will be populated by JS -->
            </div>
            <form id="payment-form">
                <select id="payment-method" required>
                    <option value="">Select Payment Method</option>
                    <option value="credit-card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                </select>
                <input type="text" id="card-number" placeholder="Card Number" style="display:none;">
                <input type="text" id="expiry" placeholder="Expiry Date" style="display:none;">
                <input type="text" id="cvv" placeholder="CVV" style="display:none;">
                <button type="submit">Pay</button>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
